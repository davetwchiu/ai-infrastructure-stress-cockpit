name: Update dashboard data

on:
  schedule:
    - cron: "20 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/update_data.py --self-test
      - run: python3 -m py_compile scripts/update_data.py
      - run: node --check app.js
      - run: python3 scripts/update_data.py
      - name: Commit data changes
        run: |
          if git diff --quiet -- data/latest.json data/history.csv; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.csv
          git commit -m "Update dashboard data"
          git push
