name: Update dashboard data

on:
  schedule:
    - cron: "20 11 * * 1-5"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/update_data.py --self-test
      - run: python3 -m py_compile scripts/update_data.py
      - run: node --check app.js
      - run: python3 scripts/update_data.py
      - name: Commit data changes
        run: |
          if git diff --quiet -- data/latest.json data/history.csv; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.csv
          git commit -m "Update dashboard data"
          git push
      - run: rm -rf scripts/__pycache__
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
